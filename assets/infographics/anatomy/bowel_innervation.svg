<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1419"/>
      <stop offset="100%" stop-color="#131820"/>
    </linearGradient>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22D3EE"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34D399"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F97316"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#A78BFA"/>
    </marker>
  </defs>

  <rect width="800" height="700" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#22D3EE" font-size="22" font-weight="700" letter-spacing="0.5">BOWEL INNERVATION</text>
  <text x="400" y="56" text-anchor="middle" fill="#5A6575" font-size="12">Extrinsic &amp; Intrinsic Neural Control of GI Tract</text>
  <line x1="150" y1="66" x2="650" y2="66" stroke="#22D3EE" stroke-width="1" opacity="0.4"/>

  <!-- Brain/Brainstem -->
  <ellipse cx="400" cy="105" rx="40" ry="22" fill="#1A1F2E" stroke="#22D3EE" stroke-width="2"/>
  <text x="400" y="110" text-anchor="middle" fill="#22D3EE" font-size="10" font-weight="700">Brainstem</text>

  <!-- Vagus nerve from brainstem -->
  <path d="M370,120 Q300,160 280,220 Q260,280 270,340" fill="none" stroke="#22D3EE" stroke-width="2.5" marker-end="url(#arrowCyan)"/>
  <text x="250" y="200" fill="#22D3EE" font-size="10" font-weight="700" transform="rotate(-70 250 200)">Vagus (CN X)</text>

  <!-- Spinal cord -->
  <rect x="393" y="130" width="14" height="400" rx="4" fill="#2A3545" stroke="#3A4255" stroke-width="1"/>

  <!-- T12-L2 sympathetic level -->
  <rect x="385" y="250" width="30" height="50" rx="3" fill="#F97316" fill-opacity="0.15" stroke="#F97316" stroke-width="1"/>
  <text x="380" y="280" text-anchor="end" fill="#F97316" font-size="10" font-weight="700">T12-L2</text>

  <!-- S2-S4 parasympathetic level -->
  <rect x="385" y="420" width="30" height="50" rx="3" fill="#34D399" fill-opacity="0.15" stroke="#34D399" stroke-width="1"/>
  <text x="380" y="450" text-anchor="end" fill="#34D399" font-size="10" font-weight="700">S2-S4</text>

  <!-- GI Tract representation -->
  <!-- Stomach -->
  <path d="M200,340 Q180,360 200,380 Q220,395 260,385 L260,345 Q240,335 200,340Z" fill="#1E2A3A" stroke="#5A6575" stroke-width="1.5"/>
  <text x="225" y="365" text-anchor="middle" fill="#9CA3AF" font-size="8">Stomach</text>

  <!-- Small intestine (simplified loops) -->
  <path d="M260,365 Q300,370 310,390 Q320,410 290,420 Q260,430 270,450 Q280,465 310,460" fill="none" stroke="#5A6575" stroke-width="3" stroke-linecap="round"/>
  <text x="310" y="430" fill="#9CA3AF" font-size="8">Small</text>
  <text x="310" y="440" fill="#9CA3AF" font-size="8">bowel</text>

  <!-- Ascending colon -->
  <path d="M150,600 L150,480 Q150,460 170,460" fill="none" stroke="#E8ECF1" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <!-- Transverse colon -->
  <path d="M170,460 L310,460" fill="none" stroke="#E8ECF1" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <!-- Descending colon -->
  <path d="M310,460 Q330,460 330,480 L330,600" fill="none" stroke="#E8ECF1" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <!-- Sigmoid + Rectum -->
  <path d="M330,600 Q330,640 300,650 Q270,655 260,640 L260,620" fill="none" stroke="#E8ECF1" stroke-width="6" stroke-linecap="round" opacity="0.3"/>

  <!-- Colon labels -->
  <text x="135" y="540" fill="#9CA3AF" font-size="9" transform="rotate(-90 135 540)">Ascending</text>
  <text x="240" y="455" text-anchor="middle" fill="#9CA3AF" font-size="9">Transverse</text>
  <text x="345" y="540" fill="#9CA3AF" font-size="9" transform="rotate(90 345 540)">Descending</text>
  <text x="280" y="665" text-anchor="middle" fill="#9CA3AF" font-size="9">Rectum</text>

  <!-- Mid-transverse colon vagal boundary -->
  <line x1="240" y1="440" x2="240" y2="475" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="240" y="435" text-anchor="middle" fill="#F59E0B" font-size="8" font-weight="600">Vagal boundary</text>

  <!-- Vagus territory highlight -->
  <path d="M150,460 L240,460 L240,480 L150,480Z" fill="#22D3EE" fill-opacity="0.08"/>
  <path d="M170,460 L240,460" fill="none" stroke="#22D3EE" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Vagus nerve reaching mid-transverse colon -->
  <path d="M270,340 Q250,400 240,460" fill="none" stroke="#22D3EE" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Pelvic nerve S2-S4 to distal colon -->
  <path d="M393,445 Q350,480 330,530 Q320,570 290,610" fill="none" stroke="#34D399" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Sympathetic T12-L2 to colon -->
  <path d="M393,275 Q350,320 200,400 Q180,420 160,470" fill="none" stroke="#F97316" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Pudendal nerve to EAS -->
  <path d="M393,460 Q370,530 320,600 Q300,630 275,650" fill="none" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- IAS label -->
  <rect x="300" y="625" rx="3" width="15" height="25" fill="#F97316" fill-opacity="0.3" stroke="#F97316" stroke-width="1"/>
  <!-- EAS label -->
  <rect x="240" y="625" rx="3" width="15" height="25" fill="#A78BFA" fill-opacity="0.3" stroke="#A78BFA" stroke-width="1"/>

  <!-- Label boxes -->
  <!-- Vagus label -->
  <rect x="15" y="85" rx="6" width="185" height="55" fill="#1A1F2E" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="107" y="103" text-anchor="middle" fill="#22D3EE" font-size="11" font-weight="700">Vagus Nerve (CN X)</text>
  <text x="107" y="118" text-anchor="middle" fill="#67E8F9" font-size="9">Parasympathetic to proximal GI</text>
  <text x="107" y="131" text-anchor="middle" fill="#67E8F9" font-size="9">Stomach to mid-transverse colon</text>

  <!-- Pelvic nerve label -->
  <rect x="450" y="480" rx="6" width="180" height="55" fill="#1A1F2E" stroke="#34D399" stroke-width="1.5"/>
  <text x="540" y="498" text-anchor="middle" fill="#34D399" font-size="11" font-weight="700">Pelvic Nerve (S2-S4)</text>
  <text x="540" y="513" text-anchor="middle" fill="#6EE7B7" font-size="9">Parasympathetic to distal colon</text>
  <text x="540" y="528" text-anchor="middle" fill="#6EE7B7" font-size="9">Promotes peristalsis</text>

  <!-- Sympathetic label -->
  <rect x="450" y="240" rx="6" width="180" height="55" fill="#1A1F2E" stroke="#F97316" stroke-width="1.5"/>
  <text x="540" y="258" text-anchor="middle" fill="#F97316" font-size="11" font-weight="700">Sympathetic (T12-L2)</text>
  <text x="540" y="273" text-anchor="middle" fill="#FDBA74" font-size="9">Inhibits peristalsis</text>
  <text x="540" y="288" text-anchor="middle" fill="#FDBA74" font-size="9">Contracts IAS</text>

  <!-- Pudendal label -->
  <rect x="450" y="570" rx="6" width="180" height="45" fill="#1A1F2E" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="540" y="588" text-anchor="middle" fill="#A78BFA" font-size="11" font-weight="700">Pudendal Nerve (S2-S4)</text>
  <text x="540" y="603" text-anchor="middle" fill="#C4B5FD" font-size="9">Somatic - voluntary EAS control</text>

  <!-- ENS box -->
  <rect x="450" y="380" rx="8" width="330" height="80" fill="#1A1F2E" stroke="#F59E0B" stroke-width="2"/>
  <text x="615" y="400" text-anchor="middle" fill="#F59E0B" font-size="12" font-weight="700">Enteric Nervous System (ENS)</text>
  <line x1="465" y1="408" x2="765" y2="408" stroke="#F59E0B" stroke-width="0.5" opacity="0.4"/>
  <text x="615" y="425" text-anchor="middle" fill="#FDE68A" font-size="10">Auerbach (myenteric): between muscle layers</text>
  <text x="615" y="440" text-anchor="middle" fill="#FDE68A" font-size="10">Meissner (submucosal): in submucosa</text>
  <text x="615" y="455" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600">"The brain of the gut" - autonomous function</text>

  <!-- IAS resting tone box -->
  <rect x="450" y="635" rx="6" width="200" height="40" fill="#1A1F2E" stroke="#F97316" stroke-width="1.5"/>
  <text x="550" y="653" text-anchor="middle" fill="#F97316" font-size="11" font-weight="700">IAS: 70-85% resting tone</text>
  <text x="550" y="668" text-anchor="middle" fill="#FDBA74" font-size="9">Involuntary - sympathetic maintained</text>
</svg>