<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="800" height="650" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1419"/>
      <stop offset="100%" stop-color="#131820"/>
    </linearGradient>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34D399"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F97316"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22D3EE"/>
    </marker>
  </defs>

  <rect width="800" height="650" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#22D3EE" font-size="22" font-weight="700" letter-spacing="0.5">SEXUAL FUNCTION PATHWAYS</text>
  <text x="400" y="56" text-anchor="middle" fill="#5A6575" font-size="12">Erection &amp; Ejaculation - "Point and Shoot" Mnemonic</text>
  <line x1="150" y1="66" x2="650" y2="66" stroke="#22D3EE" stroke-width="1" opacity="0.4"/>

  <!-- Brain -->
  <ellipse cx="400" cy="105" rx="45" ry="25" fill="#1A1F2E" stroke="#22D3EE" stroke-width="2"/>
  <text x="400" y="102" text-anchor="middle" fill="#22D3EE" font-size="10" font-weight="700">Brain</text>
  <text x="400" y="114" text-anchor="middle" fill="#67E8F9" font-size="8">(MPOA, hypothalamus)</text>

  <!-- Spinal cord -->
  <rect x="393" y="130" width="14" height="380" rx="4" fill="#2A3545" stroke="#3A4255" stroke-width="1.5"/>

  <!-- T11-L2 level -->
  <rect x="385" y="230" width="30" height="55" rx="3" fill="#F97316" fill-opacity="0.15" stroke="#F97316" stroke-width="1.5"/>
  <text x="380" y="260" text-anchor="end" fill="#F97316" font-size="10" font-weight="700">T11-L2</text>

  <!-- S2-S4 level -->
  <rect x="385" y="400" width="30" height="65" rx="3" fill="#34D399" fill-opacity="0.15" stroke="#34D399" stroke-width="1.5"/>
  <text x="380" y="435" text-anchor="end" fill="#34D399" font-size="10" font-weight="700">S2-S4</text>

  <!-- Psychogenic pathway (brain → T11-L2) -->
  <path d="M380,120 Q350,160 360,200 Q365,220 385,240" fill="none" stroke="#22D3EE" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowCyan)"/>
  <text x="330" y="180" fill="#22D3EE" font-size="9" font-weight="600">Psychogenic</text>
  <text x="330" y="192" fill="#67E8F9" font-size="8">pathway</text>

  <!-- Psychogenic pathway (brain → S2-S4) -->
  <path d="M420,120 Q450,160 440,300 Q435,370 415,400" fill="none" stroke="#22D3EE" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowCyan)"/>

  <!-- ===== LEFT SIDE: "POINT" - ERECTION ===== -->
  <rect x="20" y="90" rx="10" width="250" height="230" fill="#1A1F2E" stroke="#34D399" stroke-width="2"/>
  <text x="145" y="115" text-anchor="middle" fill="#34D399" font-size="18" font-weight="700">"POINT"</text>
  <text x="145" y="133" text-anchor="middle" fill="#6EE7B7" font-size="13" font-weight="600">= Parasympathetic</text>
  <text x="145" y="148" text-anchor="middle" fill="#6EE7B7" font-size="12">= ERECTION</text>
  <line x1="35" y1="158" x2="255" y2="158" stroke="#34D399" stroke-width="0.5" opacity="0.4"/>
  <text x="35" y="178" fill="#E8ECF1" font-size="10">Origin: S2-S4 (sacral cord)</text>
  <text x="35" y="196" fill="#E8ECF1" font-size="10">Nerve: Pelvic nerve</text>
  <text x="35" y="214" fill="#E8ECF1" font-size="10">Neurotransmitter: ACh, NO, VIP</text>
  <text x="35" y="232" fill="#E8ECF1" font-size="10">Effect: Arteriolar vasodilation</text>
  <text x="35" y="250" fill="#E8ECF1" font-size="10">Engorgement of corpora</text>
  <line x1="35" y1="262" x2="255" y2="262" stroke="#34D399" stroke-width="0.5" opacity="0.4"/>
  <text x="145" y="280" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600">Reflexogenic: intact sacral arc</text>
  <text x="145" y="296" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600">Psychogenic: via T11-L2</text>
  <text x="145" y="312" text-anchor="middle" fill="#9CA3AF" font-size="9">(needs intact thoracolumbar cord)</text>

  <!-- Pelvic nerve line from S2-S4 to target -->
  <path d="M385,430 Q300,450 250,500 Q220,530 230,550" fill="none" stroke="#34D399" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="270" y="490" fill="#34D399" font-size="10" font-weight="600">Pelvic nerve</text>

  <!-- ===== RIGHT SIDE: "SHOOT" - EJACULATION ===== -->
  <rect x="530" y="90" rx="10" width="250" height="230" fill="#1A1F2E" stroke="#F97316" stroke-width="2"/>
  <text x="655" y="115" text-anchor="middle" fill="#F97316" font-size="18" font-weight="700">"SHOOT"</text>
  <text x="655" y="133" text-anchor="middle" fill="#FDBA74" font-size="13" font-weight="600">= Sympathetic</text>
  <text x="655" y="148" text-anchor="middle" fill="#FDBA74" font-size="12">= EJACULATION</text>
  <line x1="545" y1="158" x2="765" y2="158" stroke="#F97316" stroke-width="0.5" opacity="0.4"/>
  <text x="545" y="178" fill="#E8ECF1" font-size="10">Origin: T11-L2 (thoracolumbar)</text>
  <text x="545" y="196" fill="#E8ECF1" font-size="10">Nerve: Hypogastric nerve</text>
  <text x="545" y="214" fill="#E8ECF1" font-size="10">Neurotransmitter: Norepinephrine</text>
  <text x="545" y="232" fill="#E8ECF1" font-size="10">Effect: Emission phase</text>
  <text x="545" y="250" fill="#E8ECF1" font-size="10">Bladder neck closure</text>
  <line x1="545" y1="262" x2="765" y2="262" stroke="#F97316" stroke-width="0.5" opacity="0.4"/>
  <text x="655" y="280" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600">Emission: sympathetic T11-L2</text>
  <text x="655" y="296" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600">Expulsion: somatic S2-S4</text>
  <text x="655" y="312" text-anchor="middle" fill="#9CA3AF" font-size="9">(pudendal nerve, bulbospongiosus)</text>

  <!-- Hypogastric nerve from T11-L2 to target -->
  <path d="M415,258 Q500,280 550,400 Q570,470 560,540" fill="none" stroke="#F97316" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="530" y="350" fill="#F97316" font-size="10" font-weight="600">Hypogastric</text>
  <text x="530" y="363" fill="#FDBA74" font-size="9">nerve</text>

  <!-- Reflexogenic arc box (sacral reflex) -->
  <rect x="120" y="370" rx="6" width="240" height="50" fill="#1A1F2E" stroke="#34D399" stroke-width="1.5"/>
  <text x="240" y="390" text-anchor="middle" fill="#34D399" font-size="11" font-weight="700">Reflexogenic Arc (Sacral Reflex)</text>
  <text x="240" y="408" text-anchor="middle" fill="#6EE7B7" font-size="9">Genital stimulation &#8594; dorsal nerve &#8594; S2-S4 &#8594; pelvic nerve</text>

  <!-- ===== CLINICAL CORRELATIONS ===== -->
  <rect x="100" y="540" rx="10" width="600" height="95" fill="#1A1F2E" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="562" text-anchor="middle" fill="#F59E0B" font-size="13" font-weight="700">CLINICAL CORRELATIONS IN SCI</text>
  <line x1="120" y1="570" x2="680" y2="570" stroke="#F59E0B" stroke-width="0.5" opacity="0.4"/>

  <rect x="120" y="580" rx="4" width="260" height="42" fill="#0F1419" stroke="#34D399" stroke-width="1"/>
  <text x="250" y="596" text-anchor="middle" fill="#34D399" font-size="10" font-weight="600">UMN lesion (above S2-S4)</text>
  <text x="250" y="610" text-anchor="middle" fill="#6EE7B7" font-size="9">Reflexogenic erection preserved (~95%)</text>
  <text x="250" y="620" text-anchor="middle" fill="#6EE7B7" font-size="9">Psychogenic erection lost</text>

  <rect x="420" y="580" rx="4" width="260" height="42" fill="#0F1419" stroke="#F97316" stroke-width="1"/>
  <text x="550" y="596" text-anchor="middle" fill="#F97316" font-size="10" font-weight="600">LMN lesion (at/below S2-S4)</text>
  <text x="550" y="610" text-anchor="middle" fill="#FDBA74" font-size="9">Reflexogenic erection lost</text>
  <text x="550" y="620" text-anchor="middle" fill="#FDBA74" font-size="9">Psychogenic may be preserved (T11-L2)</text>
</svg>