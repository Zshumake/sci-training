<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 750" width="800" height="750" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1419"/>
      <stop offset="100%" stop-color="#131820"/>
    </linearGradient>
  </defs>

  <rect width="800" height="750" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#22D3EE" font-size="22" font-weight="700" letter-spacing="0.5">AUTONOMIC PATHWAYS IN SCI</text>
  <text x="400" y="56" text-anchor="middle" fill="#5A6575" font-size="12">Sympathetic &amp; Parasympathetic Outflow Levels</text>
  <line x1="150" y1="66" x2="650" y2="66" stroke="#22D3EE" stroke-width="1" opacity="0.4"/>

  <!-- Spinal cord representation (vertical) -->
  <rect x="370" y="85" width="60" height="600" rx="8" fill="#1E2A3A" stroke="#3A4255" stroke-width="2"/>

  <!-- IML column (T1-L2) - sympathetic -->
  <rect x="430" y="125" width="12" height="340" rx="3" fill="#F97316" fill-opacity="0.3" stroke="#F97316" stroke-width="1"/>
  <text x="455" y="300" fill="#F97316" font-size="9" font-weight="700" transform="rotate(90 455 300)">IML Column (Sympathetic)</text>

  <!-- Sacral parasympathetics (S2-S4) -->
  <rect x="430" y="570" width="12" height="70" rx="3" fill="#34D399" fill-opacity="0.3" stroke="#34D399" stroke-width="1"/>
  <text x="455" y="605" fill="#34D399" font-size="9" font-weight="700" transform="rotate(90 455 605)">Sacral Parasympathetic</text>

  <!-- Level markers on spinal cord -->
  <!-- C1 -->
  <line x1="365" y1="90" x2="435" y2="90" stroke="#5A6575" stroke-width="0.5"/>
  <text x="360" y="94" text-anchor="end" fill="#9CA3AF" font-size="10">C1</text>
  <!-- T1 -->
  <line x1="365" y1="125" x2="435" y2="125" stroke="#F97316" stroke-width="1"/>
  <text x="360" y="129" text-anchor="end" fill="#F97316" font-size="10" font-weight="700">T1</text>
  <!-- T4 -->
  <line x1="365" y1="195" x2="435" y2="195" stroke="#F97316" stroke-width="1"/>
  <text x="360" y="199" text-anchor="end" fill="#F97316" font-size="10" font-weight="700">T4</text>
  <!-- T5 -->
  <line x1="365" y1="218" x2="435" y2="218" stroke="#F97316" stroke-width="0.5"/>
  <text x="360" y="222" text-anchor="end" fill="#9CA3AF" font-size="10">T5</text>
  <!-- T6 - AD THRESHOLD -->
  <line x1="320" y1="243" x2="480" y2="243" stroke="#EF4444" stroke-width="2.5"/>
  <text x="360" y="247" text-anchor="end" fill="#EF4444" font-size="11" font-weight="700">T6</text>
  <!-- T9 -->
  <line x1="365" y1="310" x2="435" y2="310" stroke="#F97316" stroke-width="0.5"/>
  <text x="360" y="314" text-anchor="end" fill="#9CA3AF" font-size="10">T9</text>
  <!-- T10 -->
  <line x1="365" y1="335" x2="435" y2="335" stroke="#F97316" stroke-width="0.5"/>
  <text x="360" y="339" text-anchor="end" fill="#9CA3AF" font-size="10">T10</text>
  <!-- T11 -->
  <line x1="365" y1="360" x2="435" y2="360" stroke="#F97316" stroke-width="0.5"/>
  <text x="360" y="364" text-anchor="end" fill="#9CA3AF" font-size="10">T11</text>
  <!-- T12 -->
  <line x1="365" y1="385" x2="435" y2="385" stroke="#F97316" stroke-width="0.5"/>
  <text x="360" y="389" text-anchor="end" fill="#9CA3AF" font-size="10">T12</text>
  <!-- L1 -->
  <line x1="365" y1="420" x2="435" y2="420" stroke="#F97316" stroke-width="0.5"/>
  <text x="360" y="424" text-anchor="end" fill="#9CA3AF" font-size="10">L1</text>
  <!-- L2 -->
  <line x1="365" y1="465" x2="435" y2="465" stroke="#F97316" stroke-width="1"/>
  <text x="360" y="469" text-anchor="end" fill="#F97316" font-size="10" font-weight="700">L2</text>
  <!-- S2 -->
  <line x1="365" y1="570" x2="435" y2="570" stroke="#34D399" stroke-width="1"/>
  <text x="360" y="574" text-anchor="end" fill="#34D399" font-size="10" font-weight="700">S2</text>
  <!-- S4 -->
  <line x1="365" y1="640" x2="435" y2="640" stroke="#34D399" stroke-width="1"/>
  <text x="360" y="644" text-anchor="end" fill="#34D399" font-size="10" font-weight="700">S4</text>

  <!-- ===== Sympathetic outflow labels (RIGHT SIDE) ===== -->
  <!-- T1-T4 Cardiac -->
  <rect x="500" y="130" rx="8" width="250" height="55" fill="#1A1F2E" stroke="#F97316" stroke-width="1.5"/>
  <line x1="442" y1="160" x2="500" y2="160" stroke="#F97316" stroke-width="1.5"/>
  <text x="625" y="150" text-anchor="middle" fill="#F97316" font-size="12" font-weight="700">T1-T4: Cardiac Sympathetic</text>
  <text x="625" y="165" text-anchor="middle" fill="#FDBA74" font-size="10">Cardioacceleratory nerves</text>
  <text x="625" y="178" text-anchor="middle" fill="#FDBA74" font-size="9">HR, contractility, conduction</text>

  <!-- T5-T9 Greater splanchnic -->
  <rect x="500" y="220" rx="8" width="250" height="55" fill="#1A1F2E" stroke="#F97316" stroke-width="1.5"/>
  <line x1="442" y1="250" x2="500" y2="250" stroke="#F97316" stroke-width="1.5"/>
  <text x="625" y="240" text-anchor="middle" fill="#F97316" font-size="12" font-weight="700">T5-T9: Greater Splanchnic</text>
  <text x="625" y="255" text-anchor="middle" fill="#FDBA74" font-size="10">Splanchnic vasoconstriction</text>
  <text x="625" y="268" text-anchor="middle" fill="#FDBA74" font-size="9">Major blood pressure regulator</text>

  <!-- T10-T11 Lesser splanchnic -->
  <rect x="500" y="320" rx="8" width="250" height="40" fill="#1A1F2E" stroke="#F97316" stroke-width="1.5"/>
  <line x1="442" y1="340" x2="500" y2="340" stroke="#F97316" stroke-width="1.5"/>
  <text x="625" y="338" text-anchor="middle" fill="#F97316" font-size="11" font-weight="700">T10-T11: Lesser Splanchnic</text>
  <text x="625" y="353" text-anchor="middle" fill="#FDBA74" font-size="9">Renal, small intestine</text>

  <!-- T12 Least splanchnic -->
  <rect x="500" y="375" rx="8" width="250" height="30" fill="#1A1F2E" stroke="#F97316" stroke-width="1.5"/>
  <line x1="442" y1="390" x2="500" y2="390" stroke="#F97316" stroke-width="1.5"/>
  <text x="625" y="395" text-anchor="middle" fill="#F97316" font-size="11" font-weight="700">T12: Least Splanchnic</text>

  <!-- L1-L2 Lower limb -->
  <rect x="500" y="420" rx="8" width="250" height="40" fill="#1A1F2E" stroke="#F97316" stroke-width="1.5"/>
  <line x1="442" y1="440" x2="500" y2="440" stroke="#F97316" stroke-width="1.5"/>
  <text x="625" y="438" text-anchor="middle" fill="#F97316" font-size="11" font-weight="700">L1-L2: Lower Limb Sympathetic</text>
  <text x="625" y="453" text-anchor="middle" fill="#FDBA74" font-size="9">Vasomotor, sudomotor to legs</text>

  <!-- S2-S4 Parasympathetic -->
  <rect x="500" y="570" rx="8" width="250" height="55" fill="#1A1F2E" stroke="#34D399" stroke-width="1.5"/>
  <line x1="442" y1="600" x2="500" y2="600" stroke="#34D399" stroke-width="1.5"/>
  <text x="625" y="590" text-anchor="middle" fill="#34D399" font-size="12" font-weight="700">S2-S4: Sacral Parasympathetic</text>
  <text x="625" y="605" text-anchor="middle" fill="#6EE7B7" font-size="10">Bladder, bowel, sexual function</text>
  <text x="625" y="618" text-anchor="middle" fill="#6EE7B7" font-size="9">Pelvic splanchnic nerves</text>

  <!-- ===== AD Threshold highlight (LEFT SIDE) ===== -->
  <rect x="30" y="200" rx="8" width="300" height="110" fill="#1A1F2E" stroke="#EF4444" stroke-width="2"/>
  <text x="180" y="222" text-anchor="middle" fill="#EF4444" font-size="14" font-weight="700">AUTONOMIC DYSREFLEXIA</text>
  <text x="180" y="238" text-anchor="middle" fill="#EF4444" font-size="11" font-weight="600">T6 Threshold Line</text>
  <line x1="45" y1="246" x2="315" y2="246" stroke="#EF4444" stroke-width="0.5" opacity="0.4"/>
  <text x="180" y="262" text-anchor="middle" fill="#FCA5A5" font-size="10">Injuries at or above T6 are at risk</text>
  <text x="180" y="278" text-anchor="middle" fill="#FCA5A5" font-size="10">Loss of supraspinal sympathetic control</text>
  <text x="180" y="294" text-anchor="middle" fill="#FCA5A5" font-size="10">Unopposed splanchnic vasoconstriction</text>

  <!-- AD threshold arrow -->
  <line x1="320" y1="243" x2="330" y2="243" stroke="#EF4444" stroke-width="2"/>

  <!-- Clinical Pearls box -->
  <rect x="30" y="370" rx="8" width="300" height="95" fill="#1A1F2E" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="180" y="392" text-anchor="middle" fill="#22D3EE" font-size="12" font-weight="700">CLINICAL CORRELATIONS</text>
  <line x1="45" y1="400" x2="315" y2="400" stroke="#22D3EE" stroke-width="0.5" opacity="0.4"/>
  <text x="180" y="418" text-anchor="middle" fill="#E8ECF1" font-size="10">Cervical SCI: loss of ALL sympathetic outflow</text>
  <text x="180" y="433" text-anchor="middle" fill="#E8ECF1" font-size="10">High thoracic: loss of cardiac sympathetics</text>
  <text x="180" y="448" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600">Below T6: splanchnic bed still innervated</text>
  <text x="180" y="463" text-anchor="middle" fill="#F59E0B" font-size="9">= lower AD risk</text>

  <!-- Legend -->
  <rect x="30" y="85" rx="6" width="190" height="65" fill="#1A1F2E" stroke="#3A4255" stroke-width="1"/>
  <text x="125" y="103" text-anchor="middle" fill="#E8ECF1" font-size="10" font-weight="700">LEGEND</text>
  <rect x="45" y="113" width="12" height="8" rx="2" fill="#F97316" opacity="0.6"/>
  <text x="63" y="121" fill="#FDBA74" font-size="10">Sympathetic (T1-L2)</text>
  <rect x="45" y="130" width="12" height="8" rx="2" fill="#34D399" opacity="0.6"/>
  <text x="63" y="138" fill="#6EE7B7" font-size="10">Parasympathetic (S2-S4)</text>
</svg>