<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1419"/>
      <stop offset="100%" stop-color="#131820"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#22D3EE" font-size="22" font-weight="700" letter-spacing="0.5">VERTEBRAL ANATOMY</text>
  <text x="400" y="56" text-anchor="middle" fill="#5A6575" font-size="12">Typical Vertebra - Axial View with Denis Three-Column Model</text>
  <line x1="150" y1="66" x2="650" y2="66" stroke="#22D3EE" stroke-width="1" opacity="0.4"/>

  <!-- Orientation -->
  <text x="360" y="90" text-anchor="middle" fill="#5A6575" font-size="10" font-weight="600">ANTERIOR</text>
  <text x="360" y="560" text-anchor="middle" fill="#5A6575" font-size="10" font-weight="600">POSTERIOR</text>

  <!-- Vertebral Body (large oval, anterior) -->
  <ellipse cx="360" cy="200" rx="100" ry="65" fill="#2A3545" stroke="#E8ECF1" stroke-width="2"/>
  <text x="360" y="195" text-anchor="middle" fill="#E8ECF1" font-size="13" font-weight="600">Vertebral</text>
  <text x="360" y="212" text-anchor="middle" fill="#E8ECF1" font-size="13" font-weight="600">Body</text>

  <!-- Pedicles -->
  <ellipse cx="290" cy="280" rx="22" ry="18" fill="#2A3545" stroke="#F59E0B" stroke-width="2"/>
  <ellipse cx="430" cy="280" rx="22" ry="18" fill="#2A3545" stroke="#F59E0B" stroke-width="2"/>

  <!-- Laminae -->
  <path d="M290,298 L330,380 Q340,395 360,395 Q380,395 390,380 L430,298" fill="none" stroke="#A78BFA" stroke-width="2.5"/>
  <path d="M290,298 L330,380" fill="none" stroke="#A78BFA" stroke-width="2.5"/>
  <path d="M430,298 L390,380" fill="none" stroke="#A78BFA" stroke-width="2.5"/>

  <!-- Transverse Processes -->
  <path d="M268,280 L180,260 Q165,258 162,270 L168,285 Q172,295 185,290 L268,280" fill="#2A3545" stroke="#34D399" stroke-width="2"/>
  <path d="M452,280 L540,260 Q555,258 558,270 L552,285 Q548,295 535,290 L452,280" fill="#2A3545" stroke="#34D399" stroke-width="2"/>

  <!-- Spinous Process -->
  <path d="M345,395 L355,460 Q360,480 365,460 L375,395" fill="#2A3545" stroke="#EF4444" stroke-width="2"/>

  <!-- Superior Articular Facets -->
  <ellipse cx="280" cy="255" rx="15" ry="12" fill="#3B82F6" fill-opacity="0.4" stroke="#3B82F6" stroke-width="1.5"/>
  <ellipse cx="440" cy="255" rx="15" ry="12" fill="#3B82F6" fill-opacity="0.4" stroke="#3B82F6" stroke-width="1.5"/>

  <!-- Inferior Articular Facets -->
  <ellipse cx="310" cy="400" rx="14" ry="11" fill="#60A5FA" fill-opacity="0.3" stroke="#60A5FA" stroke-width="1.5"/>
  <ellipse cx="410" cy="400" rx="14" ry="11" fill="#60A5FA" fill-opacity="0.3" stroke="#60A5FA" stroke-width="1.5"/>

  <!-- Vertebral Foramen -->
  <ellipse cx="360" cy="320" rx="50" ry="45" fill="#0F1419" stroke="#22D3EE" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="360" y="315" text-anchor="middle" fill="#22D3EE" font-size="10" font-weight="600">Vertebral</text>
  <text x="360" y="328" text-anchor="middle" fill="#22D3EE" font-size="10" font-weight="600">Foramen</text>
  <!-- Spinal cord in foramen -->
  <circle cx="360" cy="318" r="15" fill="#1A1F2E" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Label lines and boxes -->
  <!-- Pedicle label -->
  <line x1="290" y1="280" x2="145" y2="340" stroke="#F59E0B" stroke-width="1"/>
  <circle cx="290" cy="280" r="3" fill="#F59E0B"/>
  <rect x="60" y="325" rx="6" width="120" height="28" fill="#1A1F2E" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="120" y="344" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="700">Pedicle</text>

  <!-- Lamina label -->
  <line x1="340" y1="385" x2="170" y2="430" stroke="#A78BFA" stroke-width="1"/>
  <rect x="60" y="415" rx="6" width="120" height="28" fill="#1A1F2E" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="120" y="434" text-anchor="middle" fill="#A78BFA" font-size="11" font-weight="700">Lamina</text>

  <!-- Transverse Process label -->
  <line x1="170" y1="270" x2="115" y2="180" stroke="#34D399" stroke-width="1"/>
  <rect x="20" y="160" rx="6" width="160" height="28" fill="#1A1F2E" stroke="#34D399" stroke-width="1.5"/>
  <text x="100" y="179" text-anchor="middle" fill="#34D399" font-size="11" font-weight="700">Transverse Process</text>

  <!-- Spinous Process label -->
  <line x1="360" y1="470" x2="360" y2="520" stroke="#EF4444" stroke-width="1"/>
  <rect x="290" y="510" rx="6" width="140" height="28" fill="#1A1F2E" stroke="#EF4444" stroke-width="1.5"/>
  <text x="360" y="529" text-anchor="middle" fill="#EF4444" font-size="11" font-weight="700">Spinous Process</text>

  <!-- Superior Articular Facet label -->
  <line x1="440" y1="255" x2="580" y2="180" stroke="#3B82F6" stroke-width="1"/>
  <circle cx="440" cy="255" r="3" fill="#3B82F6"/>
  <rect x="580" y="160" rx="6" width="180" height="28" fill="#1A1F2E" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="670" y="179" text-anchor="middle" fill="#3B82F6" font-size="11" font-weight="700">Sup. Articular Facet</text>

  <!-- Inferior Articular Facet label -->
  <line x1="410" y1="400" x2="580" y2="420" stroke="#60A5FA" stroke-width="1"/>
  <rect x="580" y="405" rx="6" width="180" height="28" fill="#1A1F2E" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="670" y="424" text-anchor="middle" fill="#60A5FA" font-size="11" font-weight="700">Inf. Articular Facet</text>

  <!-- Denis Three-Column Overlay -->
  <rect x="595" y="85" rx="8" width="190" height="145" fill="#1A1F2E" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="690" y="105" text-anchor="middle" fill="#F59E0B" font-size="13" font-weight="700">Denis 3-Column Model</text>
  <line x1="610" y1="112" x2="770" y2="112" stroke="#F59E0B" stroke-width="0.5" opacity="0.4"/>
  <rect x="610" y="122" width="12" height="8" rx="2" fill="#EF4444" opacity="0.6"/>
  <text x="628" y="130" fill="#FCA5A5" font-size="10">Anterior: body (ant 2/3)</text>
  <rect x="610" y="142" width="12" height="8" rx="2" fill="#F59E0B" opacity="0.6"/>
  <text x="628" y="150" fill="#FDE68A" font-size="10">Middle: body (post 1/3) + PLL</text>
  <rect x="610" y="162" width="12" height="8" rx="2" fill="#A78BFA" opacity="0.6"/>
  <text x="628" y="170" fill="#C4B5FD" font-size="10">Posterior: pedicle, lamina,</text>
  <text x="628" y="183" fill="#C4B5FD" font-size="10">facets, spinous process</text>
  <text x="690" y="205" text-anchor="middle" fill="#F59E0B" font-size="9" font-weight="600">2+ columns = unstable fracture</text>

  <!-- Column overlay lines on vertebra -->
  <!-- Anterior/Middle division line -->
  <line x1="260" y1="190" x2="460" y2="190" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <!-- Middle/Posterior division at pedicle junction -->
  <line x1="270" y1="260" x2="450" y2="260" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
</svg>