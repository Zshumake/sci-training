<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 950" width="800" height="950" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22D3EE"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444"/>
    </marker>
  </defs>

  <rect width="800" height="950" fill="#0F1419"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#22D3EE" font-size="22" font-weight="700">BOWEL PROGRAM ALGORITHM</text>
  <text x="400" y="58" text-anchor="middle" fill="#5A6575" font-size="12">UMN Reflex Bowel vs LMN Areflexic Bowel Management</text>
  <line x1="150" y1="68" x2="650" y2="68" stroke="#22D3EE" stroke-width="1" opacity="0.4"/>

  <!-- Starting decision -->
  <polygon points="400,90 540,135 400,180 260,135" fill="#1A1F2E" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="130" text-anchor="middle" fill="#F59E0B" font-size="13" font-weight="700">Bowel Type?</text>
  <text x="400" y="147" text-anchor="middle" fill="#FDE68A" font-size="10">(Based on lesion level)</text>

  <!-- ===== UMN REFLEX BOWEL (LEFT) ===== -->
  <line x1="310" y1="160" x2="200" y2="205" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="230" y="175" fill="#22D3EE" font-size="11" font-weight="700">UMN</text>

  <rect x="50" y="210" width="300" height="55" rx="10" fill="#1A1F2E" stroke="#22D3EE" stroke-width="2"/>
  <text x="200" y="233" text-anchor="middle" fill="#22D3EE" font-size="14" font-weight="700">UMN Reflex Bowel</text>
  <text x="200" y="250" text-anchor="middle" fill="#9CA3AF" font-size="10">Above conus - intact reflex arc</text>
  <text x="200" y="262" text-anchor="middle" fill="#9CA3AF" font-size="9">Spastic EAS, reflex-mediated evacuation</text>

  <line x1="200" y1="265" x2="200" y2="290" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 1: Timing -->
  <rect x="70" y="295" width="260" height="45" rx="8" fill="#1A1F2E" stroke="#34D399" stroke-width="1.5"/>
  <text x="90" y="313" fill="#34D399" font-size="10" font-weight="700">1.</text>
  <text x="200" y="313" text-anchor="middle" fill="#E8ECF1" font-size="11" font-weight="600">Meal + warm beverage</text>
  <text x="200" y="330" text-anchor="middle" fill="#9CA3AF" font-size="9">Trigger gastrocolic reflex - wait 20-30 min</text>

  <line x1="200" y1="340" x2="200" y2="360" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Suppository -->
  <rect x="70" y="365" width="260" height="45" rx="8" fill="#1A1F2E" stroke="#34D399" stroke-width="1.5"/>
  <text x="90" y="383" fill="#34D399" font-size="10" font-weight="700">2.</text>
  <text x="200" y="383" text-anchor="middle" fill="#E8ECF1" font-size="11" font-weight="600">Rectal suppository</text>
  <text x="200" y="400" text-anchor="middle" fill="#9CA3AF" font-size="9">Bisacodyl 10mg or magic bullet (polyethylene glycol)</text>

  <line x1="200" y1="410" x2="200" y2="430" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Digital stim -->
  <rect x="70" y="435" width="260" height="45" rx="8" fill="#1A1F2E" stroke="#34D399" stroke-width="1.5"/>
  <text x="90" y="453" fill="#34D399" font-size="10" font-weight="700">3.</text>
  <text x="200" y="453" text-anchor="middle" fill="#E8ECF1" font-size="11" font-weight="600">Digital stimulation</text>
  <text x="200" y="470" text-anchor="middle" fill="#9CA3AF" font-size="9">Circular motion 15-20 sec, repeat q5-10min</text>

  <line x1="200" y1="480" x2="200" y2="500" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Wait -->
  <rect x="70" y="505" width="260" height="40" rx="8" fill="#1A1F2E" stroke="#34D399" stroke-width="1.5"/>
  <text x="90" y="523" fill="#34D399" font-size="10" font-weight="700">4.</text>
  <text x="200" y="523" text-anchor="middle" fill="#E8ECF1" font-size="11" font-weight="600">Total program: 20-30 minutes</text>
  <text x="200" y="538" text-anchor="middle" fill="#9CA3AF" font-size="9">Goal: complete evacuation, no stool between programs</text>

  <!-- Schedule box -->
  <rect x="70" y="560" width="260" height="50" rx="6" fill="#0F1419" stroke="#F59E0B" stroke-width="1"/>
  <text x="200" y="580" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="700">SCHEDULE</text>
  <text x="200" y="598" text-anchor="middle" fill="#FDE68A" font-size="10">Every day or every other day</text>
  <text x="200" y="608" text-anchor="middle" fill="#FDE68A" font-size="9">Same time daily, 30 min post-meal</text>

  <!-- ===== LMN AREFLEXIC BOWEL (RIGHT) ===== -->
  <line x1="490" y1="160" x2="600" y2="205" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="560" y="175" fill="#F97316" font-size="11" font-weight="700">LMN</text>

  <rect x="450" y="210" width="300" height="55" rx="10" fill="#1A1F2E" stroke="#F97316" stroke-width="2"/>
  <text x="600" y="233" text-anchor="middle" fill="#F97316" font-size="14" font-weight="700">LMN Areflexic Bowel</text>
  <text x="600" y="250" text-anchor="middle" fill="#9CA3AF" font-size="10">At/below conus - lost reflex arc</text>
  <text x="600" y="262" text-anchor="middle" fill="#9CA3AF" font-size="9">Flaccid EAS, no reflex evacuation</text>

  <line x1="600" y1="265" x2="600" y2="290" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Manual evacuation -->
  <rect x="470" y="295" width="260" height="50" rx="8" fill="#1A1F2E" stroke="#F97316" stroke-width="1.5"/>
  <text x="490" y="315" fill="#F97316" font-size="10" font-weight="700">1.</text>
  <text x="600" y="315" text-anchor="middle" fill="#E8ECF1" font-size="11" font-weight="600">Manual evacuation</text>
  <text x="600" y="332" text-anchor="middle" fill="#9CA3AF" font-size="9">Gentle digital removal of stool</text>
  <text x="600" y="342" text-anchor="middle" fill="#9CA3AF" font-size="9">Primary method - no reflex to trigger</text>

  <line x1="600" y1="345" x2="600" y2="370" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Valsalva/Crede -->
  <rect x="470" y="375" width="260" height="45" rx="8" fill="#1A1F2E" stroke="#F97316" stroke-width="1.5"/>
  <text x="490" y="393" fill="#F97316" font-size="10" font-weight="700">2.</text>
  <text x="600" y="393" text-anchor="middle" fill="#E8ECF1" font-size="11" font-weight="600">Valsalva / abdominal push</text>
  <text x="600" y="410" text-anchor="middle" fill="#9CA3AF" font-size="9">Increase abdominal pressure to assist</text>

  <line x1="600" y1="420" x2="600" y2="445" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stool softeners -->
  <rect x="470" y="450" width="260" height="45" rx="8" fill="#1A1F2E" stroke="#F97316" stroke-width="1.5"/>
  <text x="490" y="468" fill="#F97316" font-size="10" font-weight="700">3.</text>
  <text x="600" y="468" text-anchor="middle" fill="#E8ECF1" font-size="11" font-weight="600">Stool softeners + bulk formers</text>
  <text x="600" y="485" text-anchor="middle" fill="#9CA3AF" font-size="9">Docusate + psyllium, keep stool formed</text>

  <!-- Higher risk note -->
  <rect x="470" y="510" width="260" height="50" rx="6" fill="#0F1419" stroke="#EF4444" stroke-width="1"/>
  <text x="600" y="530" text-anchor="middle" fill="#EF4444" font-size="10" font-weight="700">HIGHER INCONTINENCE RISK</text>
  <text x="600" y="545" text-anchor="middle" fill="#FCA5A5" font-size="9">Lax EAS - more prone to accidents</text>
  <text x="600" y="555" text-anchor="middle" fill="#FCA5A5" font-size="9">May need scheduled evacuations 1-2x daily</text>

  <!-- ===== TROUBLESHOOTING (BOTTOM) ===== -->
  <rect x="100" y="640" rx="10" width="600" height="290" fill="#1A1F2E" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="665" text-anchor="middle" fill="#F59E0B" font-size="14" font-weight="700">TROUBLESHOOTING</text>
  <line x1="120" y1="675" x2="680" y2="675" stroke="#F59E0B" stroke-width="0.5" opacity="0.4"/>

  <!-- Problem: Too long -->
  <rect x="120" y="685" rx="5" width="270" height="55" fill="#0F1419" stroke="#3A4255" stroke-width="1"/>
  <text x="130" y="702" fill="#EF4444" font-size="10" font-weight="700">Program &gt;60 min?</text>
  <text x="130" y="717" fill="#E8ECF1" font-size="9">- Adjust suppository type</text>
  <text x="130" y="730" fill="#E8ECF1" font-size="9">- Add mini-enema or docusate</text>
  <text x="130" y="743" fill="#E8ECF1" font-size="9">- Review timing (post-meal better)</text>

  <!-- Problem: Accidents -->
  <rect x="410" y="685" rx="5" width="270" height="55" fill="#0F1419" stroke="#3A4255" stroke-width="1"/>
  <text x="420" y="702" fill="#EF4444" font-size="10" font-weight="700">Accidents between programs?</text>
  <text x="420" y="717" fill="#E8ECF1" font-size="9">- Ensure complete evacuation</text>
  <text x="420" y="730" fill="#E8ECF1" font-size="9">- Diet review (decrease fiber if LMN)</text>
  <text x="420" y="743" fill="#E8ECF1" font-size="9">- Increase program frequency</text>

  <!-- Problem: Constipation -->
  <rect x="120" y="750" rx="5" width="270" height="55" fill="#0F1419" stroke="#3A4255" stroke-width="1"/>
  <text x="130" y="767" fill="#EF4444" font-size="10" font-weight="700">Persistent constipation?</text>
  <text x="130" y="782" fill="#E8ECF1" font-size="9">- Increase fluids (2-3L/day)</text>
  <text x="130" y="797" fill="#E8ECF1" font-size="9">- Add senna or MiraLAX</text>
  <text x="130" y="810" fill="#E8ECF1" font-size="9">- Rule out ileus/obstruction</text>

  <!-- Problem: AD during program -->
  <rect x="410" y="750" rx="5" width="270" height="55" fill="#0F1419" stroke="#3A4255" stroke-width="1"/>
  <text x="420" y="767" fill="#EF4444" font-size="10" font-weight="700">AD during bowel program?</text>
  <text x="420" y="782" fill="#E8ECF1" font-size="9">- Stop program, sit upright</text>
  <text x="420" y="797" fill="#E8ECF1" font-size="9">- Use topical lidocaine gel</text>
  <text x="420" y="810" fill="#E8ECF1" font-size="9">- Resume when BP normalizes</text>

  <!-- Medication options -->
  <rect x="120" y="820" rx="6" width="560" height="95" fill="#0F1419" stroke="#22D3EE" stroke-width="1"/>
  <text x="400" y="840" text-anchor="middle" fill="#22D3EE" font-size="12" font-weight="700">ADJUNCT MEDICATIONS</text>
  <line x1="135" y1="848" x2="665" y2="848" stroke="#22D3EE" stroke-width="0.5" opacity="0.4"/>
  <text x="400" y="866" text-anchor="middle" fill="#E8ECF1" font-size="10">Oral: senna, bisacodyl tabs, PEG 3350, docusate sodium</text>
  <text x="400" y="882" text-anchor="middle" fill="#E8ECF1" font-size="10">Rectal: bisacodyl suppository, mini-enema, magic bullet</text>
  <text x="400" y="898" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600">Avoid: mineral oil (aspiration risk), stimulant laxative overuse</text>
  <text x="400" y="914" text-anchor="middle" fill="#FCA5A5" font-size="10">Refractory: Malone antegrade continence enema (MACE) / colostomy</text>
</svg>