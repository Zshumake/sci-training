<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 950" width="800" height="950" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22D3EE"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34D399"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444"/>
    </marker>
  </defs>

  <rect width="800" height="950" fill="#0F1419"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#22D3EE" font-size="22" font-weight="700">RESPIRATORY WEANING ALGORITHM</text>
  <text x="400" y="58" text-anchor="middle" fill="#5A6575" font-size="12">Ventilator Weaning &amp; Decannulation in SCI</text>
  <line x1="150" y1="68" x2="650" y2="68" stroke="#22D3EE" stroke-width="1" opacity="0.4"/>

  <!-- Start: Vent Dependent -->
  <rect x="250" y="85" width="300" height="50" rx="10" fill="#1A1F2E" stroke="#EF4444" stroke-width="2"/>
  <text x="400" y="107" text-anchor="middle" fill="#EF4444" font-size="14" font-weight="700">Ventilator Dependent</text>
  <text x="400" y="125" text-anchor="middle" fill="#FCA5A5" font-size="10">Cervical SCI, acute phase stabilized</text>

  <line x1="400" y1="135" x2="400" y2="160" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Assessment -->
  <rect x="200" y="165" width="400" height="75" rx="10" fill="#1A1F2E" stroke="#22D3EE" stroke-width="2"/>
  <text x="230" y="187" fill="#22D3EE" font-size="11" font-weight="700">ASSESS READINESS</text>
  <text x="400" y="205" text-anchor="middle" fill="#E8ECF1" font-size="11">FVC (sitting and supine)</text>
  <text x="400" y="220" text-anchor="middle" fill="#E8ECF1" font-size="11">NIF (negative inspiratory force)</text>
  <text x="400" y="235" text-anchor="middle" fill="#9CA3AF" font-size="9">Medical stability, secretion management, nutrition</text>

  <line x1="400" y1="240" x2="400" y2="265" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decision: Ready to wean? -->
  <polygon points="400,275 520,320 400,365 280,320" fill="#1A1F2E" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="313" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="600">FVC &gt;1L AND</text>
  <text x="400" y="328" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="600">NIF &lt; -20 cmH2O?</text>

  <!-- NO branch -->
  <line x1="280" y1="320" x2="150" y2="320" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="210" y="312" fill="#EF4444" font-size="10" font-weight="700">NO</text>

  <rect x="15" y="290" width="130" height="60" rx="8" fill="#1A1F2E" stroke="#EF4444" stroke-width="1.5"/>
  <text x="80" y="310" text-anchor="middle" fill="#EF4444" font-size="10" font-weight="600">Not ready to wean</text>
  <text x="80" y="325" text-anchor="middle" fill="#FCA5A5" font-size="9">Continue vent support</text>
  <text x="80" y="338" text-anchor="middle" fill="#FCA5A5" font-size="9">Reassess weekly</text>

  <!-- Phrenic pacer branch from NO -->
  <line x1="80" y1="350" x2="80" y2="385" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="15" y="390" width="130" height="75" rx="8" fill="#1A1F2E" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="80" y="410" text-anchor="middle" fill="#A78BFA" font-size="10" font-weight="700">Phrenic Pacing?</text>
  <text x="80" y="425" text-anchor="middle" fill="#C4B5FD" font-size="9">C1-C2 with intact</text>
  <text x="80" y="437" text-anchor="middle" fill="#C4B5FD" font-size="9">phrenic LMN (C3-5)</text>
  <text x="80" y="452" text-anchor="middle" fill="#C4B5FD" font-size="9">EMG confirmed</text>
  <text x="80" y="462" text-anchor="middle" fill="#F59E0B" font-size="8" font-weight="600">Thoracoscopic implant</text>

  <!-- YES branch down -->
  <line x1="400" y1="365" x2="400" y2="395" stroke="#34D399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="415" y="386" fill="#34D399" font-size="10" font-weight="700">YES</text>

  <!-- PVFB Trial -->
  <rect x="230" y="400" width="340" height="60" rx="10" fill="#1A1F2E" stroke="#34D399" stroke-width="2"/>
  <text x="260" y="420" fill="#34D399" font-size="11" font-weight="700">PVFB TRIAL</text>
  <text x="400" y="430" text-anchor="middle" fill="#E8ECF1" font-size="11">Progressive Ventilator-Free Breathing</text>
  <text x="400" y="445" text-anchor="middle" fill="#9CA3AF" font-size="10">Start with T-piece or trach collar trials</text>
  <text x="400" y="455" text-anchor="middle" fill="#9CA3AF" font-size="9">Increase time off vent gradually (15min increments)</text>

  <line x1="400" y1="460" x2="400" y2="490" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Progressive wean steps -->
  <rect x="200" y="495" width="400" height="80" rx="10" fill="#1A1F2E" stroke="#22D3EE" stroke-width="2"/>
  <text x="230" y="515" fill="#22D3EE" font-size="11" font-weight="700">PROGRESSIVE WEAN</text>
  <text x="400" y="530" text-anchor="middle" fill="#E8ECF1" font-size="10">Phase 1: Daytime vent-free (build to 12-16 hrs)</text>
  <text x="400" y="545" text-anchor="middle" fill="#E8ECF1" font-size="10">Phase 2: Nighttime trials (monitor SpO2, ETCO2)</text>
  <text x="400" y="560" text-anchor="middle" fill="#E8ECF1" font-size="10">Phase 3: 24-hour vent-free</text>
  <text x="400" y="572" text-anchor="middle" fill="#F59E0B" font-size="9" font-weight="600">Monitor: RR, TV, SpO2, ETCO2, signs of fatigue</text>

  <line x1="400" y1="575" x2="400" y2="605" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Trach cap trial -->
  <rect x="230" y="610" width="340" height="55" rx="10" fill="#1A1F2E" stroke="#34D399" stroke-width="2"/>
  <text x="260" y="630" fill="#34D399" font-size="11" font-weight="700">TRACH CAP TRIAL</text>
  <text x="400" y="640" text-anchor="middle" fill="#E8ECF1" font-size="11">Downsized cuffless trach + cap</text>
  <text x="400" y="655" text-anchor="middle" fill="#E8ECF1" font-size="10">Tolerate 24-48 hrs without distress</text>
  <text x="400" y="665" text-anchor="middle" fill="#9CA3AF" font-size="9">Adequate cough, secretion management</text>

  <line x1="400" y1="665" x2="400" y2="695" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decision: Pass? -->
  <polygon points="400,705 490,735 400,765 310,735" fill="#1A1F2E" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="735" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="600">Tolerated?</text>

  <!-- YES - Decannulation -->
  <line x1="400" y1="765" x2="400" y2="795" stroke="#34D399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="415" y="785" fill="#34D399" font-size="10" font-weight="700">YES</text>

  <rect x="260" y="800" width="280" height="50" rx="10" fill="#1A1F2E" stroke="#34D399" stroke-width="2.5"/>
  <text x="400" y="822" text-anchor="middle" fill="#34D399" font-size="16" font-weight="700">DECANNULATION</text>
  <text x="400" y="840" text-anchor="middle" fill="#6EE7B7" font-size="10">Remove trach, monitor 24-48 hrs</text>

  <!-- NO branch -->
  <line x1="490" y1="735" x2="620" y2="735" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="550" y="727" fill="#EF4444" font-size="10" font-weight="700">NO</text>
  <rect x="625" y="710" width="160" height="50" rx="8" fill="#1A1F2E" stroke="#EF4444" stroke-width="1.5"/>
  <text x="705" y="730" text-anchor="middle" fill="#EF4444" font-size="10" font-weight="600">Step back, reassess</text>
  <text x="705" y="745" text-anchor="middle" fill="#FCA5A5" font-size="9">Continue secretion mgmt</text>
  <text x="705" y="755" text-anchor="middle" fill="#FCA5A5" font-size="9">Retry in 1-2 weeks</text>

  <!-- Adjuncts box -->
  <rect x="530" y="420" rx="8" width="250" height="130" fill="#1A1F2E" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="655" y="440" text-anchor="middle" fill="#F59E0B" font-size="12" font-weight="700">ADJUNCT THERAPIES</text>
  <line x1="545" y1="448" x2="765" y2="448" stroke="#F59E0B" stroke-width="0.5" opacity="0.4"/>
  <text x="545" y="465" fill="#FDE68A" font-size="10">- Assisted cough techniques</text>
  <text x="545" y="480" fill="#FDE68A" font-size="10">- Mechanical insufflation-exsufflation</text>
  <text x="545" y="495" fill="#FDE68A" font-size="10">- Abdominal binder (upright FVC)</text>
  <text x="545" y="510" fill="#FDE68A" font-size="10">- Glossopharyngeal breathing</text>
  <text x="545" y="525" fill="#FDE68A" font-size="10">- Respiratory muscle training</text>
  <text x="545" y="540" fill="#FDE68A" font-size="10">- Secretion clearance protocols</text>

  <!-- Key criteria box -->
  <rect x="20" y="490" rx="8" width="165" height="100" fill="#1A1F2E" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="102" y="510" text-anchor="middle" fill="#22D3EE" font-size="11" font-weight="700">DECANULATION</text>
  <text x="102" y="523" text-anchor="middle" fill="#22D3EE" font-size="11" font-weight="700">CRITERIA</text>
  <line x1="35" y1="530" x2="170" y2="530" stroke="#22D3EE" stroke-width="0.5" opacity="0.4"/>
  <text x="35" y="545" fill="#67E8F9" font-size="9">FVC &gt;15 mL/kg</text>
  <text x="35" y="560" fill="#67E8F9" font-size="9">PCF &gt;160 L/min</text>
  <text x="35" y="575" fill="#67E8F9" font-size="9">No vent for 48+ hrs</text>
  <text x="35" y="588" fill="#67E8F9" font-size="9">Manageable secretions</text>

  <!-- Timeline -->
  <rect x="100" y="870" rx="8" width="600" height="60" fill="#1A1F2E" stroke="#3A4255" stroke-width="1"/>
  <text x="400" y="892" text-anchor="middle" fill="#22D3EE" font-size="12" font-weight="700">TYPICAL TIMELINE</text>
  <text x="400" y="912" text-anchor="middle" fill="#E8ECF1" font-size="10">C3-C4: weeks to months | C5-C6: days to weeks | C7+: usually wean in acute care</text>
  <text x="400" y="926" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600">High cervical (C1-C2): may be lifelong vent or phrenic pacer candidate</text>
</svg>