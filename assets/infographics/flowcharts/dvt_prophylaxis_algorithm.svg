<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850" width="800" height="850" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22D3EE"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34D399"/>
    </marker>
  </defs>

  <rect width="800" height="850" fill="#0F1419"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#22D3EE" font-size="22" font-weight="700">DVT PROPHYLAXIS ALGORITHM</text>
  <text x="400" y="58" text-anchor="middle" fill="#5A6575" font-size="12">VTE Prevention in Acute &amp; Subacute SCI</text>
  <line x1="150" y1="68" x2="650" y2="68" stroke="#22D3EE" stroke-width="1" opacity="0.4"/>

  <!-- Timeline bar at top -->
  <rect x="50" y="85" width="700" height="50" rx="8" fill="#1A1F2E" stroke="#3A4255" stroke-width="1.5"/>
  <text x="400" y="102" text-anchor="middle" fill="#22D3EE" font-size="12" font-weight="700">TIMELINE FROM INJURY</text>
  <!-- Timeline markers -->
  <line x1="130" y1="110" x2="130" y2="135" stroke="#5A6575" stroke-width="1"/>
  <text x="130" y="128" text-anchor="middle" fill="#9CA3AF" font-size="9">0 hrs</text>
  <line x1="250" y1="110" x2="250" y2="135" stroke="#F59E0B" stroke-width="2"/>
  <text x="250" y="128" text-anchor="middle" fill="#F59E0B" font-size="9" font-weight="600">72 hrs</text>
  <line x1="450" y1="110" x2="450" y2="135" stroke="#5A6575" stroke-width="1"/>
  <text x="450" y="128" text-anchor="middle" fill="#9CA3AF" font-size="9">2 weeks</text>
  <line x1="600" y1="110" x2="600" y2="135" stroke="#34D399" stroke-width="2"/>
  <text x="600" y="128" text-anchor="middle" fill="#34D399" font-size="9" font-weight="600">8-12 weeks</text>

  <!-- Phase bar colors -->
  <rect x="130" y="115" width="120" height="8" rx="2" fill="#EF4444" opacity="0.5"/>
  <rect x="250" y="115" width="350" height="8" rx="2" fill="#F59E0B" opacity="0.5"/>

  <!-- Phase 1: 0-72 hrs -->
  <rect x="50" y="150" width="300" height="80" rx="10" fill="#1A1F2E" stroke="#EF4444" stroke-width="2"/>
  <text x="80" y="170" fill="#EF4444" font-size="12" font-weight="700">PHASE 1: 0-72 HOURS</text>
  <text x="200" y="190" text-anchor="middle" fill="#E8ECF1" font-size="11">Mechanical prophylaxis ONLY</text>
  <text x="200" y="207" text-anchor="middle" fill="#E8ECF1" font-size="10">- SCDs (sequential compression devices)</text>
  <text x="200" y="222" text-anchor="middle" fill="#E8ECF1" font-size="10">- TED hose (graduated compression)</text>

  <!-- Why box -->
  <rect x="370" y="150" width="200" height="80" rx="8" fill="#1A1F2E" stroke="#3A4255" stroke-width="1"/>
  <text x="470" y="170" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="700">WHY DELAY?</text>
  <text x="470" y="188" text-anchor="middle" fill="#FDE68A" font-size="9">Hemorrhagic risk</text>
  <text x="470" y="203" text-anchor="middle" fill="#FDE68A" font-size="9">Surgical planning</text>
  <text x="470" y="218" text-anchor="middle" fill="#FDE68A" font-size="9">Hemodynamic instability</text>

  <line x1="200" y1="230" x2="200" y2="260" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2: 72 hrs start LMWH -->
  <rect x="50" y="265" width="500" height="75" rx="10" fill="#1A1F2E" stroke="#F59E0B" stroke-width="2"/>
  <text x="80" y="287" fill="#F59E0B" font-size="12" font-weight="700">PHASE 2: 72 HOURS - START CHEMICAL PROPHYLAXIS</text>
  <text x="300" y="305" text-anchor="middle" fill="#E8ECF1" font-size="11">LMWH: Enoxaparin 30mg BID (preferred)</text>
  <text x="300" y="322" text-anchor="middle" fill="#E8ECF1" font-size="10">OR UFH 5000U q8h if renal impairment (CrCl &lt;30)</text>
  <text x="300" y="336" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="600">CONTINUE mechanical prophylaxis + LMWH</text>

  <line x1="300" y1="340" x2="300" y2="370" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Decision: Contraindication? -->
  <polygon points="300,380 420,420 300,460 180,420" fill="#1A1F2E" stroke="#F59E0B" stroke-width="2"/>
  <text x="300" y="415" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="600">Chemical</text>
  <text x="300" y="430" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="600">contraindicated?</text>

  <!-- YES - IVC Filter -->
  <line x1="180" y1="420" x2="80" y2="420" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="130" y="412" fill="#EF4444" font-size="10" font-weight="700">YES</text>

  <rect x="15" y="440" width="170" height="80" rx="8" fill="#1A1F2E" stroke="#EF4444" stroke-width="2"/>
  <text x="100" y="460" text-anchor="middle" fill="#EF4444" font-size="12" font-weight="700">IVC Filter</text>
  <line x1="30" y1="468" x2="170" y2="468" stroke="#EF4444" stroke-width="0.5" opacity="0.4"/>
  <text x="100" y="485" text-anchor="middle" fill="#FCA5A5" font-size="9">Retrievable preferred</text>
  <text x="100" y="498" text-anchor="middle" fill="#FCA5A5" font-size="9">Remove when safe to</text>
  <text x="100" y="511" text-anchor="middle" fill="#FCA5A5" font-size="9">anticoagulate</text>

  <!-- NO - Continue -->
  <line x1="300" y1="460" x2="300" y2="490" stroke="#34D399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="315" y="480" fill="#34D399" font-size="10" font-weight="700">NO</text>

  <!-- Phase 3: Continue 8-12 weeks -->
  <rect x="120" y="495" width="420" height="60" rx="10" fill="#1A1F2E" stroke="#34D399" stroke-width="2"/>
  <text x="140" y="517" fill="#34D399" font-size="12" font-weight="700">PHASE 3: CONTINUE 8-12 WEEKS</text>
  <text x="330" y="535" text-anchor="middle" fill="#E8ECF1" font-size="11">Maintain LMWH throughout acute/subacute rehab</text>
  <text x="330" y="548" text-anchor="middle" fill="#9CA3AF" font-size="10">Discontinue when mobilizing or at 12 weeks</text>

  <!-- PE signs and workup branch -->
  <rect x="50" y="590" rx="10" width="700" height="120" fill="#1A1F2E" stroke="#EF4444" stroke-width="2"/>
  <text x="400" y="612" text-anchor="middle" fill="#EF4444" font-size="14" font-weight="700">SUSPECTED DVT/PE WORKUP</text>
  <line x1="70" y1="622" x2="730" y2="622" stroke="#EF4444" stroke-width="0.5" opacity="0.4"/>

  <!-- DVT signs -->
  <rect x="70" y="632" rx="5" width="200" height="65" fill="#0F1419" stroke="#3A4255" stroke-width="1"/>
  <text x="170" y="650" text-anchor="middle" fill="#EF4444" font-size="11" font-weight="700">DVT Signs</text>
  <text x="80" y="665" fill="#FCA5A5" font-size="9">Unilateral leg swelling</text>
  <text x="80" y="678" fill="#FCA5A5" font-size="9">Warmth, erythema</text>
  <text x="80" y="691" fill="#FCA5A5" font-size="9">Low-grade fever</text>

  <!-- PE signs -->
  <rect x="290" y="632" rx="5" width="200" height="65" fill="#0F1419" stroke="#3A4255" stroke-width="1"/>
  <text x="390" y="650" text-anchor="middle" fill="#EF4444" font-size="11" font-weight="700">PE Signs</text>
  <text x="300" y="665" fill="#FCA5A5" font-size="9">Dyspnea, tachycardia</text>
  <text x="300" y="678" fill="#FCA5A5" font-size="9">Pleuritic chest pain</text>
  <text x="300" y="691" fill="#FCA5A5" font-size="9">Hypoxia, hemoptysis</text>

  <!-- Workup -->
  <rect x="510" y="632" rx="5" width="220" height="65" fill="#0F1419" stroke="#3A4255" stroke-width="1"/>
  <text x="620" y="650" text-anchor="middle" fill="#22D3EE" font-size="11" font-weight="700">Workup</text>
  <text x="520" y="665" fill="#67E8F9" font-size="9">D-dimer (low sensitivity in SCI)</text>
  <text x="520" y="678" fill="#67E8F9" font-size="9">Doppler US (DVT) / CT-PA (PE)</text>
  <text x="520" y="691" fill="#67E8F9" font-size="9">Treat: heparin drip, then warfarin/DOAC</text>

  <!-- Risk factors box -->
  <rect x="590" y="265" width="190" height="130" fill="#1A1F2E" stroke="#F59E0B" stroke-width="1.5" rx="8"/>
  <text x="685" y="285" text-anchor="middle" fill="#F59E0B" font-size="12" font-weight="700">SCI VTE RISK</text>
  <line x1="605" y1="293" x2="765" y2="293" stroke="#F59E0B" stroke-width="0.5" opacity="0.4"/>
  <text x="605" y="310" fill="#FDE68A" font-size="9">Incidence: 50-80% without</text>
  <text x="605" y="323" fill="#FDE68A" font-size="9">prophylaxis in first 3 months</text>
  <text x="605" y="340" fill="#E8ECF1" font-size="9">Peak risk: 2-3 weeks post-injury</text>
  <text x="605" y="357" fill="#E8ECF1" font-size="9">Complete &gt; incomplete</text>
  <text x="605" y="374" fill="#E8ECF1" font-size="9">Paraplegia + tetraplegia</text>
  <text x="605" y="391" fill="#FCA5A5" font-size="9" font-weight="600">PE: leading cause of death</text>
  <text x="605" y="403" fill="#FCA5A5" font-size="9" font-weight="600">in acute SCI</text>

  <!-- Contraindications to chemical -->
  <rect x="50" y="730" rx="8" width="340" height="100" fill="#1A1F2E" stroke="#EF4444" stroke-width="1.5"/>
  <text x="220" y="752" text-anchor="middle" fill="#EF4444" font-size="12" font-weight="700">CHEMICAL CONTRAINDICATIONS</text>
  <line x1="65" y1="760" x2="375" y2="760" stroke="#EF4444" stroke-width="0.5" opacity="0.4"/>
  <text x="70" y="777" fill="#FCA5A5" font-size="10">- Active hemorrhage</text>
  <text x="70" y="792" fill="#FCA5A5" font-size="10">- Spinal epidural hematoma</text>
  <text x="70" y="807" fill="#FCA5A5" font-size="10">- Severe coagulopathy (plt &lt;50K)</text>
  <text x="70" y="822" fill="#FCA5A5" font-size="10">- Planned surgery within 24h</text>

  <!-- Monitoring box -->
  <rect x="420" y="730" rx="8" width="340" height="100" fill="#1A1F2E" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="590" y="752" text-anchor="middle" fill="#22D3EE" font-size="12" font-weight="700">MONITORING</text>
  <line x1="435" y1="760" x2="745" y2="760" stroke="#22D3EE" stroke-width="0.5" opacity="0.4"/>
  <text x="435" y="777" fill="#67E8F9" font-size="10">- CBC with platelets q3 days (HIT)</text>
  <text x="435" y="792" fill="#67E8F9" font-size="10">- Anti-Xa levels if renal concerns</text>
  <text x="435" y="807" fill="#67E8F9" font-size="10">- Daily limb circumference</text>
  <text x="435" y="822" fill="#67E8F9" font-size="10">- Screen for occult bleeding</text>
</svg>